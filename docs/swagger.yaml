definitions:
  handler.DeleteAccountRequest:
    properties:
      password:
        example: rahasia123
        type: string
    type: object
  handler.DiskusiRequest:
    properties:
      message:
        example: Halo semuanya, kapan kita kumpul?
        type: string
    type: object
  handler.RegisterRequest:
    properties:
      password:
        example: rahasia
        type: string
      role:
        example: user
        type: string
      username:
        example: budi123
        type: string
    type: object
  handler.RegisterTouringRequest:
    properties:
      bike_model:
        example: Yamaha NMAX 155
        type: string
      license_plate:
        example: D 1234 ABC
        type: string
      touring_id:
        example: 1
        type: integer
    type: object
  handler.TouringRequest:
    properties:
      deskripsi:
        example: Touring santai akhir pekan
        type: string
      harga_tiket:
        example: 0
        type: integer
      image_url:
        example: https://example.com/image.jpg
        type: string
      kuota:
        example: 50
        type: integer
      lokasi_akhir:
        example: Lembang Park
        type: string
      lokasi_awal:
        example: Gasibu
        type: string
      nama_touring:
        example: Touring Lembang
        type: string
      tanggal:
        example: "2026-08-15"
        type: string
      tujuan:
        example: Lembang, Bandung
        type: string
      waktu:
        example: "08:00"
        type: string
    type: object
  handler.UpdateProfileRequest:
    properties:
      email:
        example: budi@example.com
        type: string
      full_name:
        example: Budi Santoso
        type: string
      phone_number:
        example: "08123456789"
        type: string
    type: object
  handler.VehicleRequest:
    properties:
      bike_model:
        example: Honda PCX
        type: string
      license_plate:
        example: D 5678 EFG
        type: string
    type: object
  model.Diskusi:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_edited:
        type: boolean
      message:
        type: string
      touring:
        $ref: '#/definitions/model.Touring'
      touring_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.User'
      user_id:
        type: integer
    type: object
  model.LoginRequest:
    properties:
      password:
        example: secret
        type: string
      username:
        example: alice
        type: string
    type: object
  model.PasswordChangeRequest:
    properties:
      new_password:
        example: newpass
        type: string
      old_password:
        example: oldpass
        type: string
    type: object
  model.Registration:
    properties:
      bike_model:
        type: string
      id:
        type: integer
      license_plate:
        type: string
      registered_at:
        type: string
      touring:
        $ref: '#/definitions/model.Touring'
      touring_id:
        type: integer
      user:
        $ref: '#/definitions/model.User'
      user_id:
        type: integer
    type: object
  model.Touring:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      deskripsi:
        type: string
      harga_tiket:
        type: integer
      id:
        type: integer
      image_url:
        type: string
      kuota:
        type: integer
      lokasi_akhir:
        type: string
      lokasi_awal:
        type: string
      nama_touring:
        type: string
      tanggal:
        type: string
      tujuan:
        type: string
      updated_at:
        type: string
      waktu:
        type: string
    type: object
  model.User:
    properties:
      created_at:
        type: string
      email:
        description: 'Changed: removed NOT NULL to handle existing data'
        type: string
      email_verified:
        type: boolean
      full_name:
        type: string
      id:
        type: integer
      phone_number:
        type: string
      profile_photo:
        type: string
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
      vehicles:
        items:
          $ref: '#/definitions/model.Vehicle'
        type: array
    type: object
  model.Vehicle:
    properties:
      bike_model:
        type: string
      created_at:
        type: string
      id:
        type: integer
      license_plate:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.User'
      user_id:
        type: integer
    type: object
  utils.Swagger401Response:
    properties:
      message:
        example: token tidak valid atau sudah expired
        type: string
    type: object
  utils.Swagger403Response:
    properties:
      message:
        example: user tidak memiliki akses untuk fitur ini
        type: string
    type: object
  utils.SwaggerBasicResponse:
    properties:
      data:
        example: string
        type: string
      error:
        example: detail error
        type: string
      message:
        example: detail pesan
        type: string
    type: object
info:
  contact: {}
  description: Ini adalah dokumentasi API untuk platform OtoMeet.
  title: OtoMeet API
  version: "1.0"
paths:
  /api/change-password:
    put:
      consumes:
      - application/json
      description: Mengubah password user yang sedang aktif login
      parameters:
      - description: Password Lama dan Baru
        in: body
        name: password
        required: true
        schema:
          $ref: '#/definitions/model.PasswordChangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Ubah Password User
      tags:
      - Authentication
  /api/delete-account:
    delete:
      consumes:
      - application/json
      description: Menghapus akun user secara permanen
      parameters:
      - description: Password Konfirmasi
        in: body
        name: password
        required: true
        schema:
          $ref: '#/definitions/handler.DeleteAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Hapus Akun
      tags:
      - User Profile
  /api/delete-profile-photo:
    delete:
      description: Menghapus foto profil user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hapus Foto Profil
      tags:
      - User Profile
  /api/diskusi/{id}:
    delete:
      description: Menghapus pesan diskusi. Hanya pemilik pesan yang bisa menghapusnya.
      parameters:
      - description: ID Diskusi
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Swagger403Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Hapus Pesan Diskusi
      tags:
      - Diskusi
    put:
      consumes:
      - application/json
      description: Memperbarui teks pesan diskusi yang sudah ada. Hanya pemilik pesan
        yang bisa mengeditnya.
      parameters:
      - description: ID Diskusi
        in: path
        name: id
        required: true
        type: integer
      - description: Teks Pesan Baru
        in: body
        name: diskusi
        required: true
        schema:
          $ref: '#/definitions/handler.DiskusiRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Swagger403Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Edit Pesan Diskusi
      tags:
      - Diskusi
  /api/diskusi/latest:
    get:
      description: Mengambil semua pesan terbaru di atas ID tertentu
      parameters:
      - description: Last Message ID
        in: query
        name: last_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Diskusi'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Ambil Pesan Diskusi Terbaru Global
      tags:
      - Diskusi
  /api/me:
    get:
      description: Mengambil data profil user yang sedang login
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Lihat Profil User
      tags:
      - User Profile
  /api/my-touring:
    get:
      description: Melihat daftar agenda touring apa saja yang pernah diikuti oleh
        user login saat ini
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Registration'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Riwayat Touring Saya
      tags:
      - Registration
  /api/profile:
    put:
      consumes:
      - application/json
      description: Mengubah data profil user yang sedang login
      parameters:
      - description: Data Profil
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Update Profil User
      tags:
      - User Profile
  /api/register-touring:
    post:
      consumes:
      - application/json
      description: Mendaftarkan diri dan kendaraan ke dalam salah satu jadwal touring
      parameters:
      - description: Data Kendaraan
        in: body
        name: register
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterTouringRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Gabung Agenda Touring
      tags:
      - Registration
  /api/touring:
    get:
      description: Mengambil semua daftar agenda touring komunitas dengan pagination
        dan search (User & Admin)
      parameters:
      - description: 'Nomor halaman (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah data per halaman (default: 10)'
        in: query
        name: limit
        type: integer
      - description: Cari berdasarkan nama atau tujuan touring
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Lihat Semua Jadwal Touring
      tags:
      - Touring
    post:
      consumes:
      - application/json
      description: Menambahkan jadwal touring baru ke database (Khusus Admin Only)
      parameters:
      - description: Data Agenda
        in: body
        name: touring
        required: true
        schema:
          $ref: '#/definitions/handler.TouringRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Swagger403Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Buat Agenda Touring Baru
      tags:
      - Touring
  /api/touring/{id}:
    delete:
      description: Menghapus agenda touring berdasarkan ID (Khusus Admin Only)
      parameters:
      - description: Touring ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Swagger403Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Hapus Jadwal Touring
      tags:
      - Touring
    get:
      description: Mengambil detail satu agenda touring berdasarkan ID
      parameters:
      - description: Touring ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Touring'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Detail Jadwal Touring
      tags:
      - Touring
    put:
      consumes:
      - application/json
      description: Mengubah data agenda touring berdasarkan ID (Khusus Admin Only)
      parameters:
      - description: Touring ID
        in: path
        name: id
        required: true
        type: integer
      - description: Data Perubahan
        in: body
        name: touring
        required: true
        schema:
          $ref: '#/definitions/handler.TouringRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Swagger403Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Edit Jadwal Touring
      tags:
      - Touring
  /api/touring/{id}/diskusi:
    get:
      description: Mengambil semua komentar/diskusi untuk suatu agenda touring
      parameters:
      - description: Touring ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Diskusi'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Ambil Diskusi Touring
      tags:
      - Diskusi
    post:
      consumes:
      - application/json
      description: Menambahkan komentar baru ke dalam agenda touring tertentu
      parameters:
      - description: Touring ID
        in: path
        name: id
        required: true
        type: integer
      - description: Pesan Diskusi
        in: body
        name: diskusi
        required: true
        schema:
          $ref: '#/definitions/handler.DiskusiRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Kirim Komentar Diskusi
      tags:
      - Diskusi
  /api/touring/{id}/peserta:
    get:
      description: Admin dapat melihat semua peserta yang mendaftar pada suatu agenda
        touring
      parameters:
      - description: Touring ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Registration'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Swagger403Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Daftar Peserta Touring
      tags:
      - Registration
  /api/upload-profile-photo:
    post:
      consumes:
      - multipart/form-data
      description: Mengupload foto profil user
      parameters:
      - description: Foto profil (JPG, PNG, GIF, max 5MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upload Foto Profil
      tags:
      - User Profile
  /api/user/{id}:
    get:
      description: Mengambil data profil user publik berdasarkan user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Lihat Profil User Lain
      tags:
      - User Profile
  /api/vehicles:
    get:
      description: Mengambil daftar kendaraan milik user yang sedang login
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Lihat Garasi Kendaraan
      tags:
      - Vehicle
    post:
      consumes:
      - application/json
      description: Menambahkan kendaraan baru ke garasi user
      parameters:
      - description: Data Kendaraan
        in: body
        name: vehicle
        required: true
        schema:
          $ref: '#/definitions/handler.VehicleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Swagger401Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerBasicResponse'
      security:
      - BearerAuth: []
      summary: Tambah Kendaraan
      tags:
      - Vehicle
  /api/vehicles/{id}:
    delete:
